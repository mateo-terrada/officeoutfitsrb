<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabobank Outfits | Teo's Office Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #1a3a52;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            border: 2px solid #d0d0d0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #333;
        }

        .tab-btn:hover {
            border-color: #1a3a52;
            color: #1a3a52;
        }

        .tab-btn.active {
            background: #1a3a52;
            color: white;
            border-color: #1a3a52;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #d0d0d0;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            transition: all 0.3s ease;
            color: #333;
        }

        .filter-btn:hover {
            border-color: #1a3a52;
            color: #1a3a52;
        }

        .filter-btn.active {
            background: #1a3a52;
            color: white;
            border-color: #1a3a52;
        }

        .outfits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .outfit-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            display: none;
            position: relative;
        }

        .outfit-card.show {
            display: flex;
            flex-direction: column;
        }

        .outfit-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transform: translateY(-5px);
        }

        .outfit-card.custom {
            border: 2px solid #6a1b9a;
        }

        .custom-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #6a1b9a;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 700;
        }

        .outfit-header {
            padding: 15px 20px;
            border-bottom: 2px solid #f0f0f0;
            background: #f9fafb;
        }

        .outfit-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #1a3a52;
            margin-bottom: 5px;
        }

        .outfit-context {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
        }

        .formality-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .formal {
            background: #e3f2fd;
            color: #1565c0;
        }

        .elegante-sport {
            background: #f3e5f5;
            color: #6a1b9a;
        }

        .casual {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .outfit-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .prenda-grupo {
            margin-bottom: 18px;
        }

        .prenda-tipo {
            font-size: 0.75em;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
        }

        .prenda-nombre {
            font-size: 1.05em;
            color: #333;
            margin-bottom: 4px;
        }

        .outfit-notes {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.9em;
            color: #666;
            font-style: italic;
        }

        .outfit-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }

        .delete-btn {
            flex: 1;
            padding: 10px 14px;
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .delete-btn:hover {
            background: #ef5350;
            color: white;
            border-color: #ef5350;
        }

        .delete-confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .delete-confirm-dialog {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .delete-confirm-dialog .dialog-icon {
            font-size: 2.5em;
            margin-bottom: 12px;
        }

        .delete-confirm-dialog h3 {
            color: #1a3a52;
            margin-bottom: 8px;
            font-size: 1.15em;
        }

        .delete-confirm-dialog p {
            color: #666;
            margin-bottom: 24px;
            font-size: 0.9em;
            line-height: 1.4;
        }

        .delete-confirm-dialog .dialog-buttons {
            display: flex;
            gap: 12px;
        }

        .delete-confirm-dialog .btn-cancel {
            flex: 1;
            padding: 12px;
            background: #f5f5f5;
            color: #333;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .delete-confirm-dialog .btn-cancel:hover {
            background: #e0e0e0;
        }

        .delete-confirm-dialog .btn-confirm-delete {
            flex: 1;
            padding: 12px;
            background: #ef5350;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .delete-confirm-dialog .btn-confirm-delete:hover {
            background: #c62828;
        }

        .delete-success-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #c62828;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95em;
            box-shadow: 0 4px 20px rgba(198,40,40,0.3);
            z-index: 1001;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .delete-success-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .form-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a3a52;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1a3a52;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #1a3a52;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background: #0f2438;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .success-message {
            background: #c8e6c9;
            color: #2e7d32;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h2 {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: #666;
        }

        /* Random Outfit */
        .random-btn {
            padding: 12px 24px;
            border: 2px solid #e67e22;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
        }

        .random-btn:hover {
            background: linear-gradient(135deg, #e67e22, #d35400);
            border-color: #d35400;
            transform: scale(1.03);
        }

        .random-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .random-dialog {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.2s ease;
        }

        .random-dialog h3 {
            color: #1a3a52;
            margin-bottom: 6px;
            font-size: 1.2em;
        }

        .random-dialog p {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .random-category-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 18px;
        }

        .random-cat-btn {
            padding: 14px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.2s;
            color: #333;
        }

        .random-cat-btn:hover {
            border-color: #e67e22;
            color: #e67e22;
            background: #fff8f0;
        }

        .random-cat-btn.selected {
            border-color: #e67e22;
            background: #e67e22;
            color: white;
        }

        .random-result {
            text-align: left;
            margin-top: 20px;
        }

        .random-result .outfit-title {
            text-align: center;
            font-size: 1.3em;
            margin-bottom: 5px;
        }

        .random-result .formality-badge {
            display: block;
            text-align: center;
            margin-bottom: 18px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .random-result .prenda-grupo {
            margin-bottom: 14px;
        }

        .random-dialog .dialog-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .random-dialog .btn-cancel {
            flex: 1;
            padding: 12px;
            background: #f5f5f5;
            color: #333;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .random-dialog .btn-cancel:hover {
            background: #e0e0e0;
        }

        .btn-random-generate {
            flex: 1;
            padding: 12px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .btn-random-generate:hover {
            background: #d35400;
        }

        .btn-random-generate:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-save-random {
            flex: 1;
            padding: 12px;
            background: #1a3a52;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .btn-save-random:hover {
            background: #0f2438;
        }

        .btn-retry-random {
            flex: 1;
            padding: 12px;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .btn-retry-random:hover {
            background: #e67e22;
        }

        .random-success-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2e7d32;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95em;
            box-shadow: 0 4px 20px rgba(46,125,50,0.3);
            z-index: 1001;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .random-success-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            .outfits-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .filters {
                flex-direction: column;
            }

            .filter-btn {
                width: 100%;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏦 Rabobank Outfits</h1>
            <p class="subtitle">Tu guardarropas profesional para el traineeship</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('sugeridos')">Outfits Sugeridos</button>
            <button class="tab-btn" onclick="switchTab('crear')">Crear Outfit</button>
            <button class="tab-btn" onclick="switchTab('mios')">Mis Outfits</button>
            <button class="random-btn" onclick="openRandomOutfit()">🎲 Outfit al Azar</button>
        </div>

        <!-- TAB: SUGERIDOS -->
        <div class="tab-content active" id="tab-sugeridos">
            <div class="filters">
                <button class="filter-btn active" onclick="filterOutfits('todos')">Todos (11)</button>
                <button class="filter-btn" onclick="filterOutfits('formal')">Formal (4)</button>
                <button class="filter-btn" onclick="filterOutfits('elegante-sport')">Elegante Sport (5)</button>
                <button class="filter-btn" onclick="filterOutfits('casual')">Casual (2)</button>
            </div>
            <div class="outfits-grid" id="outfitsGrid"></div>
        </div>

        <!-- TAB: CREAR -->
        <div class="tab-content" id="tab-crear">
            <div class="form-section">
                <h2 style="margin-bottom: 20px; color: #1a3a52;">Crear tu propio outfit</h2>
                <div class="success-message" id="successMessage">✓ Outfit creado exitosamente</div>
                
                <form onsubmit="handleCreateOutfit(event)">
                    <div class="form-group">
                        <label>Nombre del outfit</label>
                        <input type="text" id="outfitName" placeholder="ej: Mi combo favorito" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Contexto/Ocasión</label>
                            <input type="text" id="outfitContext" placeholder="ej: Reuniones casuales" required>
                        </div>
                        <div class="form-group">
                            <label>Nivel de formalidad</label>
                            <select id="outfitFormality" required>
                                <option value="">Selecciona...</option>
                                <option value="formal">Formal</option>
                                <option value="elegante-sport">Elegante Sport</option>
                                <option value="casual">Casual</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Pantalón</label>
                        <select id="outfitPantalon" required>
                            <option value="">Selecciona un pantalón...</option>
                            <option value="Azul Zara por altura del tobillo">Azul Zara por altura del tobillo</option>
                            <option value="Negro Zara por altura del tobilo">Negro Zara por altura del tobilo</option>
                            <option value="Gris medio de traje">Gris medio de traje</option>
                            <option value="Gris medio-oscuro nuevo">Gris medio-oscuro nuevo</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Camisa</label>
                        <select id="outfitCamisa" required>
                            <option value="">Selecciona una camisa...</option>
                            <option value="Blanca lisa">Blanca lisa</option>
                            <option value="Celeste lisa (claro)">Celeste lisa (claro)</option>
                            <option value="Celeste medio-oscuro con pequeños detalles en blanco (Brooksfield)">Celeste medio-oscuro con detalles (Brooksfield)</option>
                            <option value="Gris haspeado">Gris haspeado</option>
                            <option value="Rayas celeste claro y blanco (Polo)">Rayas celeste claro y blanco (Polo)</option>
                            <option value="Rayas finitas azul y blanco">Rayas finitas azul y blanco</option>
                            <option value="Azul oscuro">Azul oscuro</option>
                            <option value="Celeste medio-oscuro con lineas pequeñas blancas y rojas (Brooksfield)">Celeste con líneas blancas y rojas (Brooksfield)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Abrigo/Sweater</label>
                        <select id="outfitAbrigo" required>
                            <option value="">Selecciona un abrigo...</option>
                            <option value="Sweater patagonia gris haspeado (quarter-zip)">Sweater Patagonia gris haspeado (quarter-zip)</option>
                            <option value="Campera Patagonia roja/bordeau">Campera Patagonia roja/bordeau</option>
                            <option value="Sweater UNIQLO azul">Sweater UNIQLO azul</option>
                            <option value="Sweater UNIQLO celeste oscuro">Sweater UNIQLO celeste oscuro</option>
                            <option value="Quarter-zip gris oscuro Springfield">Quarter-zip gris oscuro Springfield</option>
                            <option value="Quarter-zip gris claro (Polo)">Quarter-zip gris claro (Polo)</option>
                            <option value="Quarter-zip azul Polo (estilo lana)">Quarter-zip azul Polo (estilo lana)</option>
                            <option value="Quarter-zip bordeau Polo (estilo lana)">Quarter-zip bordeau Polo (estilo lana)</option>
                            <option value="Campera Brooksfield negra (tipo polar)">Campera Brooksfield negra (tipo polar)</option>
                            <option value="Campera Brooksfield bordeau (tipo polar)">Campera Brooksfield bordeau (tipo polar)</option>
                            <option value="Sweater finito Brooksfield azul con rayas blancas">Sweater finito Brooksfield azul con rayas blancas</option>
                            <option value="Chaleco Patagonia gris haspeado">Chaleco Patagonia gris haspeado</option>
                            <option value="Chaleco Patagonia azul haspeado">Chaleco Patagonia azul haspeado</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Zapatos</label>
                        <select id="outfitZapatos" required>
                            <option value="">Selecciona zapatos...</option>
                            <option value="Vans negras">Vans negras</option>
                            <option value="Adidas Spezial beige y negro">Adidas Spezial beige y negro</option>
                            <option value="Tiger blancas con líneas negras">Tiger blancas con líneas negras</option>
                            <option value="Levis azules con marrón">Levis azules con marrón</option>
                            <option value="Zapatos marrones">Zapatos marrones</option>
                            <option value="Zapatos negros">Zapatos negros</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Notas personales (opcional)</label>
                        <textarea id="outfitNotes" placeholder="ej: Combina bien con el chaleco, considerá el clima..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Guardar Outfit 💾</button>
                </form>
            </div>
        </div>

        <!-- TAB: MIS OUTFITS -->
        <div class="tab-content" id="tab-mios">
            <div id="customOutfitsContainer"></div>
        </div>
    </div>

    <div id="deleteSuccessToast" class="delete-success-toast">🗑 Outfit eliminado</div>
    <div id="randomSuccessToast" class="random-success-toast">✓ Outfit guardado en "Mis Outfits"</div>

    <script>
        const outfits = [
            {
                id: 1,
                nombre: "The Classic Banker",
                formalidad: "formal",
                contexto: "Presentaciones, meetings importantes, primeros días",
                prendas: {
                    pantalon: "Gris medio de traje",
                    camisa: "Blanca lisa",
                    abrigo: "Chaleco Patagonia gris haspeado",
                    zapatos: "Zapatos negros"

        // ============ TAB MANAGEMENT ============
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.target.classList.add('active');

            // Load custom outfits when switching to "mis outfits"
            if (tabName === 'mios') {
                renderCustomOutfits();
            }
        }

        // ============ SUGGESTED OUTFITS ============
        function renderOutfits(filtro = 'todos') {
            const grid = document.getElementById('outfitsGrid');
            grid.innerHTML = '';

            const outfitsFiltrados = filtro === 'todos' 
                ? outfits.filter(o => !o.custom)
                : outfits.filter(o => o.formalidad === filtro && !o.custom);

            if (outfitsFiltrados.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h2>No hay outfits en esta categoría</h2></div>';
                return;
            }

            outfitsFiltrados.forEach(outfit => {
                const card = document.createElement('div');
                card.className = 'outfit-card show';
                
                const formalidadClass = outfit.formalidad.replace('-', '-');
                const formalidadLabel = outfit.formalidad === 'elegante-sport' 
                    ? 'Elegante Sport' 
                    : outfit.formalidad.charAt(0).toUpperCase() + outfit.formalidad.slice(1);

                card.innerHTML = `
                    <div class="outfit-header">
                        <div class="outfit-title">${outfit.nombre}</div>
                        <div class="outfit-context">${outfit.contexto}</div>
                        <span class="formality-badge ${formalidadClass}">${formalidadLabel}</span>
                    </div>
                    <div class="outfit-content">
                        <div class="prenda-grupo">
                            <span class="prenda-tipo">Pantalón</span>
                            <div class="prenda-nombre">${outfit.prendas.pantalon}</div>
                        </div>
                        <div class="prenda-grupo">
                            <span class="prenda-tipo">Camisa</span>
                            <div class="prenda-nombre">${outfit.prendas.camisa}</div>
                        </div>
                        <div class="prenda-grupo">
                            <span class="prenda-tipo">Abrigo</span>
                            <div class="prenda-nombre">${outfit.prendas.abrigo}</div>
                        </div>
                        <div class="prenda-grupo">
                            <span class="prenda-tipo">Zapatos</span>
                            <div class="prenda-nombre">${outfit.prendas.zapatos}</div>
                        </div>
                        <div class="outfit-notes">${outfit.notas}</div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function filterOutfits(filtro) {
            document.querySelectorAll('#tab-sugeridos .filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderOutfits(filtro);
        }

        // ============ CREATE OUTFIT ============
        function handleCreateOutfit(event) {
            event.preventDefault();

            const newOutfit = {
                id: Date.now(),
                nombre: document.getElementById('outfitName').value,
                contexto: document.getElementById('outfitContext').value,
                formalidad: document.getElementById('outfitFormality').value,
                prendas: {
                    pantalon: document.getElementById('outfitPantalon').value,
                    camisa: document.getElementById('outfitCamisa').value,
                    abrigo: document.getElementById('outfitAbrigo').value,
                    zapatos: document.getElementById('outfitZapatos').value
                },
                notas: document.getElementById('outfitNotes').value || 'Sin notas',
                custom: true
            };

            // Save to localStorage
            let savedOutfits = JSON.parse(localStorage.getItem('customOutfits')) || [];
            savedOutfits.push(newOutfit);
            localStorage.setItem('customOutfits', JSON.stringify(savedOutfits));

            // Show success message
            const successMsg = document.getElementById('successMessage');
            successMsg.classList.add('show');
            setTimeout(() => successMsg.classList.remove('show'), 3000);

            // Reset form
            event.target.reset();
        }

        // ============ CUSTOM OUTFITS ============
        function renderCustomOutfits() {
            const container = document.getElementById('customOutfitsContainer');
            const savedOutfits = JSON.parse(localStorage.getItem('customOutfits')) || [];

            if (savedOutfits.length === 0) {
                container.innerHTML = '<div class="empty-state"><h2>Todavía no creaste ningún outfit</h2><p>Andá a "Crear Outfit" para empezar 👕</p></div>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'outfits-grid';

            savedOutfits.forEach(outfit => {
                const card = document.createElement('div');
                card.className = 'outfit-card show custom';
                
                const formalidadLabel = outfit.formalidad === 'elegante-sport' 
                    ? 'Elegante Sport' 
                    : outfit.formalidad.charAt(0).toUpperCase() + outfit.formalidad.slice(1);

                card.innerHTML = `
                    <div class="custom-badge">TU OUTFIT</div>
                    <div class="outfit-header">
                        <div class="outfit-title">${outfit.nombre}</div>
                        <div class="outfit-context">${outfit.contexto}</div>
                        <span class="formality-badge ${outfit.formalidad}">${formalidadLabel}</span>
                    </div>
                    <div class="outfit-content">
                        <div class="prenda-grupo">
                            <span class="prenda-tipo">Pantalón</span>
                            <div class="prenda-nombre">${outfit.prendas.pantalon}</div>
                        </div>
                        <div class="prenda-grupo">
                            <span class="prenda-tipo">Camisa</span>
                            <div class="prenda-nombre">${outfit.prendas.camisa}</div>
                        </div>
                        <div class="prenda-grupo">
                            <span class="prenda-tipo">Abrigo</span>
                            <div class="prenda-nombre">${outfit.prendas.abrigo}</div>
                        </div>
                        <div class="prenda-grupo">
                            <span class="prenda-tipo">Zapatos</span>
                            <div class="prenda-nombre">${outfit.prendas.zapatos}</div>
                        </div>
                        <div class="outfit-notes">${outfit.notas}</div>
                        <div class="outfit-actions">
                            <button class="delete-btn" onclick="deleteOutfit(${outfit.id}, '${outfit.nombre.replace(/'/g, "\\'")}')">🗑 Eliminar</button>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });

            container.innerHTML = '';
            container.appendChild(grid);
        }

        function deleteOutfit(id, nombre) {
            const overlay = document.createElement('div');
            overlay.className = 'delete-confirm-overlay';
            overlay.innerHTML = `
                <div class="delete-confirm-dialog">
                    <div class="dialog-icon">🗑️</div>
                    <h3>¿Eliminar este outfit?</h3>
                    <p>Vas a eliminar <strong>"${nombre}"</strong>. Esta acción no se puede deshacer.</p>
                    <div class="dialog-buttons">
                        <button class="btn-cancel" onclick="closeDeleteDialog()">Cancelar</button>
                        <button class="btn-confirm-delete" onclick="confirmDeleteOutfit(${id})">Sí, eliminar</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closeDeleteDialog();
            });
        }

        function closeDeleteDialog() {
            const overlay = document.querySelector('.delete-confirm-overlay');
            if (overlay) overlay.remove();
        }

        function confirmDeleteOutfit(id) {
            closeDeleteDialog();
            let savedOutfits = JSON.parse(localStorage.getItem('customOutfits')) || [];
            savedOutfits = savedOutfits.filter(o => o.id !== id);
            localStorage.setItem('customOutfits', JSON.stringify(savedOutfits));
            renderCustomOutfits();

            // Show delete success toast
            const toast = document.getElementById('deleteSuccessToast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        let randomSelectedCategory = null;
        let lastRandomOutfit = null;

        const randomOutfitNames = {
            formal: ["The Boardroom", "Power Suit", "The Executive", "Corporate Edge", "The Closer", "Sharp & Polished", "The Dealmaker", "First Impression", "Office Alpha", "The VP Look"],
            'elegante-sport': ["Smart Casual King", "The Afterwork", "Friday Vibes", "Brunch Ready", "The Hybrid", "City Walk", "The Networker", "Effortless Cool", "Classy & Chill", "The All-Rounder"],
            casual: ["Weekend Mode", "Off Duty", "Street Style", "The Chillin'", "Easy Going", "No Stress Look", "Relax & Go", "Lazy Sunday", "Low Key Fire", "The Everyday"]
        };

        function randomPick(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateOutfitName(cat) {
            const names = randomOutfitNames[cat] || randomOutfitNames['casual'];
            return randomPick(names);
        }

        function openRandomOutfit() {
            randomSelectedCategory = null;
            lastRandomOutfit = null;
            const overlay = document.createElement('div');
            overlay.className = 'random-overlay';
            overlay.id = 'randomOverlay';
            overlay.innerHTML = `
                <div class="random-dialog">
                    <div style="font-size: 2.5em; margin-bottom: 10px;">🎲</div>
                    <h3>Outfit al Azar</h3>
                    <p>Elegí una categoría y se genera un outfit random</p>
                    <div class="random-category-btns" id="randomCatBtns">
                        <button class="random-cat-btn" onclick="selectRandomCategory('formal', this)">Formal</button>
                        <button class="random-cat-btn" onclick="selectRandomCategory('elegante-sport', this)">Elegante Sport</button>
                        <button class="random-cat-btn" onclick="selectRandomCategory('casual', this)">Casual</button>
                    </div>
                    <div id="randomResultArea"></div>
                    <div class="dialog-buttons">
                        <button class="btn-cancel" onclick="closeRandomDialog()">Cerrar</button>
                        <button class="btn-random-generate" id="btnGenerate" onclick="generateRandomOutfit()" disabled>Generar 🎲</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closeRandomDialog();
            });
        }

        function selectRandomCategory(cat, btn) {
            randomSelectedCategory = cat;
            lastRandomOutfit = null;
            document.getElementById('randomResultArea').innerHTML = '';
            document.querySelectorAll('#randomCatBtns .random-cat-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            const genBtn = document.getElementById('btnGenerate');
            genBtn.disabled = false;
            genBtn.textContent = 'Generar 🎲';
        }

        function generateRandomOutfit() {
            const cat = randomSelectedCategory;
            if (!cat) return;

            const formalidadLabel = cat === 'elegante-sport' ? 'Elegante Sport' : cat.charAt(0).toUpperCase() + cat.slice(1);

            const outfitName = generateOutfitName(cat);

            lastRandomOutfit = {
                id: Date.now(),
                nombre: outfitName,
                contexto: 'Generado al azar',
                formalidad: cat,
                prendas: {
                    pantalon: randomPick(prendas.pantalon),
                    camisa: randomPick(prendas.camisa),
                    abrigo: randomPick(prendas.abrigo),
                    zapatos: randomPick(prendas.zapatos)
                },
                notas: 'Outfit generado aleatoriamente',
                custom: true
            };

            const resultArea = document.getElementById('randomResultArea');
            resultArea.innerHTML = `
                <div class="random-result">
                    <div class="outfit-title">🎲 ${outfitName}</div>
                    <span class="formality-badge ${cat}">${formalidadLabel}</span>
                    <div class="prenda-grupo">
                        <span class="prenda-tipo">Pantalón</span>
                        <div class="prenda-nombre">${lastRandomOutfit.prendas.pantalon}</div>
                    </div>
                    <div class="prenda-grupo">
                        <span class="prenda-tipo">Camisa</span>
                        <div class="prenda-nombre">${lastRandomOutfit.prendas.camisa}</div>
                    </div>
                    <div class="prenda-grupo">
                        <span class="prenda-tipo">Abrigo</span>
                        <div class="prenda-nombre">${lastRandomOutfit.prendas.abrigo}</div>
                    </div>
                    <div class="prenda-grupo">
                        <span class="prenda-tipo">Zapatos</span>
                        <div class="prenda-nombre">${lastRandomOutfit.prendas.zapatos}</div>
                    </div>
                </div>
            `;

            // Update buttons
            const buttonsDiv = document.querySelector('.random-dialog .dialog-buttons');
            buttonsDiv.innerHTML = `
                <button class="btn-cancel" onclick="closeRandomDialog()">Cerrar</button>
                <button class="btn-retry-random" onclick="generateRandomOutfit()">Otro 🎲</button>
                <button class="btn-save-random" onclick="saveRandomOutfit()">Guardar 💾</button>
            `;
        }

        function saveRandomOutfit() {
            if (!lastRandomOutfit) return;
            let savedOutfits = JSON.parse(localStorage.getItem('customOutfits')) || [];

            localStorage.setItem('customOutfits', JSON.stringify(savedOutfits));

            const toast = document.getElementById('randomSuccessToast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function closeRandomDialog() {

            if (overlay) overlay.remove();
